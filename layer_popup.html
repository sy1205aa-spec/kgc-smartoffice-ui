    <script>
        $(function () {
            layerPopup();
            layerClose();
        });

        function layerPopup() {
            var btn = $('.js-click-modal');

            btn.on('click', function () {
                $('#wrap').addClass('modal-open');

                if (btn.hasClass('btn-repeat')) {
                    $('.repeat-area').addClass('on');
                }
            });
        };

        function layerClose() {
            var btn = $('.modal .btn-layerClose');

            btn.on('click', function () {
                $('#wrap').removeClass('modal-open');
                $(this).closest('.modal > .popupSeat-box').removeClass('on');
            });
        }
    </script>
