<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>차량 상세/등록 - Smart Office Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body class="admin-page">

<main class="admin-content">
  <div class="page-heading">
    <div>
      <p class="eyebrow">PARKING VEHICLE DETAIL</p>
      <h1 id="parking-vehicle-title">차량번호 등록</h1>
      <p>사용자별 주차 차량번호를 등록하거나 수정합니다.</p>
    </div>
    <a class="button button--ghost button--list" href="parking-vehicles.html">목록</a>
  </div>

  <section class="panel management-form-panel">
    <form id="parking-vehicle-form" onsubmit="handleSave(event)">
      <div class="form-grid form-grid--two">
        <div class="form-field">
          <label for="userId">사용자 ID (사번)</label>
          <input id="userId" maxlength="50" placeholder="예: KGC202401" required>
        </div>
        <div class="form-field">
          <label for="userName">성명 / 부서</label>
          <input id="userName" placeholder="예: 김철수 (경영지원)">
        </div>
        <div class="form-field form-field--span-2">
          <label for="vehicleNumber">차량번호</label>
          <input id="vehicleNumber" maxlength="30" placeholder="예: 12가 3456" required>
          <span class="field-hint">차량번호는 사용자별 하루에 한 번만 변경할 수 있습니다.</span>
        </div>
      </div>
      <div class="form-actions form-actions--spaced" style="margin-top:24px;">
        <button class="button button--danger" type="button" id="deleteBtn" onclick="handleDelete()" style="display:none;">삭제</button>
        <button class="button button--primary" type="submit">저장</button>
      </div>
    </form>
  </section>
</main>

<script src="common.js"></script>
<script src="layout.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  const titleEl = document.getElementById('parking-vehicle-title');
  const deleteBtn = document.getElementById('deleteBtn');

  if (id) {
    titleEl.textContent = `차량 정보 수정 (${id})`;
    deleteBtn.style.display = 'inline-flex';
    document.getElementById('userId').value = id;
    if (id === 'KGC202401') {
      document.getElementById('userName').value = '김철수 (경영지원)';
      document.getElementById('vehicleNumber').value = '12가 3456';
    } else if (id === 'KGC202408') {
      document.getElementById('userName').value = '박선영 (IT개발)';
      document.getElementById('vehicleNumber').value = '56나 7890';
    }
  }

  function handleSave(e) {
    e.preventDefault();
    BOLayout.showToast('차량 정보가 성공적으로 저장되었습니다.');
    setTimeout(() => { location.href = 'parking-vehicles.html'; }, 1000);
  }

  function handleDelete() {
    if (confirm('해당 등록 차량 정보를 삭제하시겠습니까?')) {
      BOLayout.showToast('삭제 처리되었습니다.');
      setTimeout(() => { location.href = 'parking-vehicles.html'; }, 1000);
    }
  }
</script>
</body>
</html>
