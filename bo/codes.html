<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공통코드관리 - Smart Office Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body class="admin-page">

<main class="admin-content">
  <div class="page-heading">
    <div><p class="eyebrow">COMMON MANAGEMENT</p><h1>공통코드관리</h1><p>스마트오피스 시스템 전체에서 공통으로 사용되는 마스터 코드를 관리합니다.</p></div>
    <a class="button button--primary" href="code-detail.html">코드 등록</a>
  </div>

  <div class="code-group-list">
    <button class="code-group-chip is-active" type="button" onclick="selectCodeGroup(this, 'BUS_STATUS')">BUS_STATUS <small>(버스상태)</small></button>
    <button class="code-group-chip" type="button" onclick="selectCodeGroup(this, 'PASSENGER_TYPE')">PASSENGER_TYPE <small>(승객구분)</small></button>
    <button class="code-group-chip" type="button" onclick="selectCodeGroup(this, 'PARKING_DISCOUNT_TYPE')">PARKING_DISCOUNT_TYPE <small>(주차할인)</small></button>
  </div>

  <section class="panel">
    <div class="list-summary">그룹: <strong id="selectedGroupName">BUS_STATUS</strong> (상세 <span id="codeCount">3</span>건)</div>
    <div class="table-wrap">
      <table class="data-table">
        <thead>
          <tr><th>코드</th><th>코드명</th><th>정렬순서</th><th>설명</th><th>사용여부</th><th>관리</th></tr>
        </thead>
        <tbody id="codeTableBody">
          <tr>
            <td><strong>OPERATING</strong></td>
            <td>운행중</td>
            <td>1</td>
            <td>버스 정시 운행 중</td>
            <td><span class="pill pill--green">사용</span></td>
            <td><a class="button table-action" href="code-detail.html?id=OPERATING">수정</a></td>
          </tr>
          <tr>
            <td><strong>PREPARING</strong></td>
            <td>준비중</td>
            <td>2</td>
            <td>운행 전 대기 상태</td>
            <td><span class="pill pill--green">사용</span></td>
            <td><a class="button table-action" href="code-detail.html?id=PREPARING">수정</a></td>
          </tr>
          <tr>
            <td><strong>EXPIRING</strong></td>
            <td>종료예정</td>
            <td>3</td>
            <td>운행 기간 만료 임박</td>
            <td><span class="pill pill--amber">사용</span></td>
            <td><a class="button table-action" href="code-detail.html?id=EXPIRING">수정</a></td>
          </tr>
        </tbody>
      </table>
    </div>
  </section>
</main>

<script src="common.js"></script>
<script src="layout.js"></script>
<script>
  function selectCodeGroup(btn, groupCode) {
    document.querySelectorAll('.code-group-chip').forEach(c => c.classList.remove('is-active'));
    btn.classList.add('is-active');
    document.getElementById('selectedGroupName').textContent = groupCode;

    const tbody = document.getElementById('codeTableBody');
    if (groupCode === 'PASSENGER_TYPE') {
      tbody.innerHTML = `
        <tr><td><strong>REGULAR</strong></td><td>정기권</td><td>1</td><td>매일 이용 정기권</td><td><span class="pill pill--green">사용</span></td><td><a class="button table-action" href="code-detail.html?id=REGULAR">수정</a></td></tr>
        <tr><td><strong>DAILY</strong></td><td>일일권</td><td>2</td><td>1회성 일일권</td><td><span class="pill pill--green">사용</span></td><td><a class="button table-action" href="code-detail.html?id=DAILY">수정</a></td></tr>
      `;
    } else if (groupCode === 'PARKING_DISCOUNT_TYPE') {
      tbody.innerHTML = `
        <tr><td><strong>FULL_FREE</strong></td><td>전일 무료</td><td>1</td><td>24시간 무료 주차</td><td><span class="pill pill--green">사용</span></td><td><a class="button table-action" href="code-detail.html?id=FULL_FREE">수정</a></td></tr>
        <tr><td><strong>DISC_4H</strong></td><td>4시간 할인</td><td>2</td><td>4시간 주차 감면</td><td><span class="pill pill--green">사용</span></td><td><a class="button table-action" href="code-detail.html?id=DISC_4H">수정</a></td></tr>
      `;
    } else {
      tbody.innerHTML = `
        <tr><td><strong>OPERATING</strong></td><td>운행중</td><td>1</td><td>버스 정시 운행 중</td><td><span class="pill pill--green">사용</span></td><td><a class="button table-action" href="code-detail.html?id=OPERATING">수정</a></td></tr>
        <tr><td><strong>PREPARING</strong></td><td>준비중</td><td>2</td><td>운행 전 대기 상태</td><td><span class="pill pill--green">사용</span></td><td><a class="button table-action" href="code-detail.html?id=PREPARING">수정</a></td></tr>
        <tr><td><strong>EXPIRING</strong></td><td>종료예정</td><td>3</td><td>운행 기간 만료 임박</td><td><span class="pill pill--amber">사용</span></td><td><a class="button table-action" href="code-detail.html?id=EXPIRING">수정</a></td></tr>
      `;
    }
    document.getElementById('codeCount').textContent = tbody.rows.length;
    BOLayout.showToast(`코드 그룹: ${groupCode}`);
  }
</script>
</body>
</html>
