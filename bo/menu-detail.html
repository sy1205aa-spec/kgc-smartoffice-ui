<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>메뉴 상세/등록 - Smart Office Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body class="admin-page">

<main class="admin-content">
  <div class="page-heading">
    <div>
      <p class="eyebrow">MENU DETAIL</p>
      <h1 id="menu-detail-title">메뉴 등록</h1>
      <p>백오피스 사이드바 메뉴 트리 구조 및 라우팅 정보를 설정합니다.</p>
    </div>
    <a class="button button--ghost button--list" href="menus.html">목록</a>
  </div>

  <section class="panel">
    <form id="menu-detail-form" onsubmit="handleSave(event)">
      <div class="form-grid form-grid--two">
        <div class="form-field">
          <label for="menuId">메뉴 ID</label>
          <input id="menuId" maxlength="50" placeholder="예: BUS_MANAGEMENT" required>
        </div>
        <div class="form-field">
          <label for="menuName">메뉴명</label>
          <input id="menuName" maxlength="100" placeholder="예: 버스관리" required>
        </div>
        <div class="form-field">
          <label for="parentMenuId">상위 메뉴</label>
          <select id="parentMenuId">
            <option value="">없음 (최상위)</option>
            <option value="BUS">통근버스</option>
            <option value="PARKING">주차관리</option>
            <option value="COMMON">공통관리</option>
          </select>
        </div>
        <div class="form-field">
          <label for="menuUrl">URL 경로</label>
          <input id="menuUrl" placeholder="예: /bus">
        </div>
        <div class="form-field">
          <label for="sortOrder">정렬 순서</label>
          <input id="sortOrder" type="number" value="1">
        </div>
        <div class="form-field">
          <label for="useYn">사용 여부</label>
          <select id="useYn">
            <option value="Y">사용</option>
            <option value="N">미사용</option>
          </select>
        </div>
      </div>
      <div class="form-actions form-actions--spaced" style="margin-top:24px;">
        <button class="button button--danger" type="button" id="deleteBtn" onclick="handleDelete()" style="display:none;">삭제</button>
        <button class="button button--primary" type="submit">저장</button>
      </div>
    </form>
  </section>
</main>

<script src="common.js"></script>
<script src="layout.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  const titleEl = document.getElementById('menu-detail-title');
  const deleteBtn = document.getElementById('deleteBtn');

  if (id) {
    titleEl.textContent = `메뉴 정보 수정 (${id})`;
    deleteBtn.style.display = 'inline-flex';
    document.getElementById('menuId').value = id;
    if (id === 'BUS_MANAGEMENT') {
      document.getElementById('menuName').value = '버스관리';
      document.getElementById('parentMenuId').value = 'BUS';
      document.getElementById('menuUrl').value = '/bus';
    }
  }

  function handleSave(e) {
    e.preventDefault();
    BOLayout.showToast('메뉴 정보가 저장되었습니다.');
    setTimeout(() => { location.href = 'menus.html'; }, 1000);
  }

  function handleDelete() {
    if (confirm('해당 메뉴를 삭제하시겠습니까?')) {
      BOLayout.showToast('삭제 처리되었습니다.');
      setTimeout(() => { location.href = 'menus.html'; }, 1000);
    }
  }
</script>
</body>
</html>
