<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>공통코드 상세/등록 - Smart Office Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body class="admin-page">

<main class="admin-content">
  <div class="page-heading">
    <div>
      <p class="eyebrow">COMMON CODE DETAIL</p>
      <h1 id="code-detail-title">공통코드 등록</h1>
      <p>시스템 전반에 사용되는 마스터 공통코드를 추가/수정합니다.</p>
    </div>
    <a class="button button--ghost button--list" href="codes.html">목록</a>
  </div>

  <section class="panel">
    <form id="code-detail-form" onsubmit="handleSave(event)">
      <div class="form-grid form-grid--two">
        <div class="form-field">
          <label for="groupCode">코드 그룹</label>
          <input id="groupCode" value="BUS_STATUS" required>
        </div>
        <div class="form-field">
          <label for="code">상세 코드</label>
          <input id="code" placeholder="예: OPERATING" required>
        </div>
        <div class="form-field">
          <label for="codeName">코드명</label>
          <input id="codeName" placeholder="예: 운행중" required>
        </div>
        <div class="form-field">
          <label for="sortOrder">정렬 순서</label>
          <input id="sortOrder" type="number" value="1">
        </div>
        <div class="form-field form-field--span-2">
          <label for="codeDesc">코드 설명</label>
          <input id="codeDesc" placeholder="설명 입력">
        </div>
        <div class="form-field">
          <label for="useYn">사용 여부</label>
          <select id="useYn">
            <option value="Y">사용</option>
            <option value="N">미사용</option>
          </select>
        </div>
      </div>
      <div class="form-actions form-actions--spaced" style="margin-top:24px;">
        <button class="button button--danger" type="button" id="deleteBtn" onclick="handleDelete()" style="display:none;">삭제</button>
        <button class="button button--primary" type="submit">저장</button>
      </div>
    </form>
  </section>
</main>

<script src="common.js"></script>
<script src="layout.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  const titleEl = document.getElementById('code-detail-title');
  const deleteBtn = document.getElementById('deleteBtn');

  if (id) {
    titleEl.textContent = `코드 수정 (${id})`;
    deleteBtn.style.display = 'inline-flex';
    document.getElementById('code').value = id;
    if (id === 'OPERATING') {
      document.getElementById('codeName').value = '운행중';
      document.getElementById('codeDesc').value = '버스 정시 운행 중';
    }
  }

  function handleSave(e) {
    e.preventDefault();
    BOLayout.showToast('코드 정보가 저장되었습니다.');
    setTimeout(() => { location.href = 'codes.html'; }, 1000);
  }

  function handleDelete() {
    if (confirm('해당 코드를 삭제하시겠습니까?')) {
      BOLayout.showToast('삭제 처리되었습니다.');
      setTimeout(() => { location.href = 'codes.html'; }, 1000);
    }
  }
</script>
</body>
</html>
