<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>버스 상세/등록 - Smart Office Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body class="admin-page">

<main class="admin-content">
  <div class="page-heading">
    <div>
      <p class="eyebrow">BUS DETAIL</p>
      <h1 id="bus-detail-title">버스 등록</h1>
      <p>호차, 차량번호, 경로, 방향별 정원과 운행 정보를 관리합니다.</p>
    </div>
    <a class="button button--ghost button--list" href="bus-list.html">목록</a>
  </div>

  <section class="panel management-form-panel">
    <form id="bus-detail-form" onsubmit="handleSave(event)">
      <div class="form-grid">
        <div class="form-field">
          <label for="busNumberCode">호차</label>
          <select id="busNumberCode" required>
            <option value="">호차를 선택하세요</option>
            <option value="BUS_01">1호차</option>
            <option value="BUS_02">2호차</option>
            <option value="BUS_03">3호차</option>
            <option value="BUS_04">4호차</option>
            <option value="BUS_05">5호차</option>
          </select>
        </div>
        <div class="form-field">
          <label for="busVehicleNumber">버스 차량번호</label>
          <input id="busVehicleNumber" maxlength="30" placeholder="선택 입력">
        </div>
        <div class="form-field form-field--span-2">
          <label for="busRoute">버스 경로</label>
          <input id="busRoute" maxlength="500" placeholder="선택 입력">
        </div>
        <div class="form-field">
          <label for="capacity">탑승 정원</label>
          <input id="capacity" type="text" inputmode="numeric" pattern="[0-9]+" maxlength="4" value="45" placeholder="숫자만 입력" required>
        </div>
        <div class="form-field">
          <label for="useYn">사용 여부</label>
          <select id="useYn" required>
            <option value="Y">사용</option>
            <option value="N">미사용</option>
          </select>
        </div>
        <div class="form-field">
          <label for="operationStartDate">운행 시작일</label>
          <input id="operationStartDate" type="date" value="2025-01-01" required>
        </div>
        <div class="form-field">
          <label for="operationEndDate">운행 종료일</label>
          <input id="operationEndDate" type="date" value="2025-12-31" required>
        </div>
      </div>
      <p class="form-help" style="margin-top:16px;">현재 또는 향후 유효한 탑승권이 등록된 버스는 미사용으로 변경할 수 없습니다.</p>
      <div class="form-actions" style="margin-top:24px;">
        <button class="button button--primary" type="submit">저장</button>
      </div>
    </form>
  </section>
</main>

<script src="common.js"></script>
<script src="layout.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const busId = urlParams.get('busId') || urlParams.get('id');
  const titleEl = document.getElementById('bus-detail-title');

  if (busId) {
    titleEl.textContent = '버스 수정';
    document.getElementById('busNumberCode').disabled = true;

    // 샘플 데이터 바인딩
    if (busId === 'BUS_01') {
      document.getElementById('busNumberCode').value = 'BUS_01';
      document.getElementById('busVehicleNumber').value = '31가 1234';
      document.getElementById('busRoute').value = '서울역 → 이천 KGC 본사';
      document.getElementById('capacity').value = '45';
      document.getElementById('useYn').value = 'Y';
      document.getElementById('operationStartDate').value = '2025-01-01';
      document.getElementById('operationEndDate').value = '2025-12-31';
    } else if (busId === 'BUS_02') {
      document.getElementById('busNumberCode').value = 'BUS_02';
      document.getElementById('busVehicleNumber').value = '32나 5678';
      document.getElementById('busRoute').value = '수원역 → 이천 KGC 본사';
      document.getElementById('capacity').value = '45';
      document.getElementById('useYn').value = 'Y';
      document.getElementById('operationStartDate').value = '2025-01-01';
      document.getElementById('operationEndDate').value = '2025-12-31';
    } else if (busId === 'BUS_03') {
      document.getElementById('busNumberCode').value = 'BUS_03';
      document.getElementById('busVehicleNumber').value = '33다 9012';
      document.getElementById('busRoute').value = '강남역 → 이천 KGC 본사';
      document.getElementById('capacity').value = '40';
      document.getElementById('useYn').value = 'Y';
      document.getElementById('operationStartDate').value = '2025-01-01';
      document.getElementById('operationEndDate').value = '2025-12-31';
    }
  }

  function handleSave(e) {
    e.preventDefault();
    if (confirm('입력한 내용으로 저장하시겠습니까?')) {
      BOLayout.showToast('저장했습니다.');
      setTimeout(() => { location.href = 'bus-list.html'; }, 800);
    }
  }
</script>
</body>
</html>
