<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>버스 상세/등록 - Smart Office Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body class="admin-page">

<main class="admin-content">
  <div class="page-heading">
    <div>
      <p class="eyebrow">BUS DETAIL</p>
      <h1 id="bus-detail-title">버스 등록</h1>
      <p>호차, 차량번호, 경로, 방향별 정원과 운행 정보를 관리합니다.</p>
    </div>
    <a class="button button--ghost button--list" href="bus-list.html">목록</a>
  </div>

  <section class="panel management-form-panel">
    <form id="bus-detail-form" onsubmit="handleSave(event)">
      <div class="form-grid">
        <div class="form-field">
          <label for="busNumberCode">호차</label>
          <select id="busNumberCode" onchange="onBusNumberChange(this.value)" required>
            <option value="">호차를 선택하세요</option>
            <option value="BUS_01">1호차 (서울역)</option>
            <option value="BUS_02">2호차 (수원역)</option>
            <option value="BUS_03">3호차 (강남역)</option>
            <option value="BUS_04">4호차 (야탑역)</option>
            <option value="BUS_05">5호차 (부평역)</option>
            <option value="BUS_06">6호차 (판교역)</option>
            <option value="BUS_07">7호차 (인천공항)</option>
          </select>
        </div>
        <div class="form-field">
          <label for="busVehicleNumber">버스 차량번호</label>
          <input id="busVehicleNumber" maxlength="30" placeholder="선택 입력 (예: 31가 1234)">
        </div>
        <div class="form-field form-field--span-2">
          <label for="busRoute">버스 경로</label>
          <input id="busRoute" maxlength="500" placeholder="선택 입력 (예: 서울역 → 이천 KGC 본사)">
        </div>
        <div class="form-field">
          <label for="capacity">탑승 정원</label>
          <input id="capacity" type="text" inputmode="numeric" pattern="[0-9]+" maxlength="4" value="45" placeholder="숫자만 입력" oninput="this.value=this.value.replace(/[^0-9]/g,'').slice(0,4)" required>
        </div>
        <div class="form-field">
          <label for="useYn">사용 여부</label>
          <select id="useYn" required>
            <option value="Y">사용</option>
            <option value="N">미사용</option>
          </select>
        </div>
        <div class="form-field">
          <label for="operationStartDate">운행 시작일</label>
          <input id="operationStartDate" type="date" value="2025-01-01" required>
        </div>
        <div class="form-field">
          <label for="operationEndDate">운행 종료일</label>
          <input id="operationEndDate" type="date" value="2025-12-31" required>
        </div>
      </div>
      <p class="form-help" style="margin-top:16px;">현재 또는 향후 유효한 탑승권이 등록된 버스는 미사용으로 변경할 수 없습니다.</p>
      <div class="form-actions" style="margin-top:24px; display:flex; justify-content:space-between;">
        <button class="button button--danger" id="deleteBtn" type="button" onclick="handleDelete()" style="display:none;">삭제</button>
        <div style="margin-left:auto; display:flex; gap:8px;">
          <a class="button button--ghost" href="bus-list.html">취소</a>
          <button class="button button--primary" type="submit" id="saveBtn">저장</button>
        </div>
      </div>
    </form>
  </section>
</main>

<script src="common.js"></script>
<script src="layout.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const busId = urlParams.get('busId') || urlParams.get('id');
  const titleEl = document.getElementById('bus-detail-title');
  const deleteBtn = document.getElementById('deleteBtn');

  // 기본 버스 정보 맵
  const busDataMap = {
    'BUS_01': { number: '1호차', vehicle: '31가 1234', route: '서울역 → 이천 KGC 본사', capacity: 45, useYn: 'Y', start: '2025-01-01', end: '2025-12-31' },
    'BUS_02': { number: '2호차', vehicle: '32나 5678', route: '수원역 → 이천 KGC 본사', capacity: 45, useYn: 'Y', start: '2025-01-01', end: '2025-12-31' },
    'BUS_03': { number: '3호차', vehicle: '33다 9012', route: '강남역 → 이천 KGC 본사', capacity: 40, useYn: 'Y', start: '2025-01-01', end: '2025-12-31' },
    'BUS_04': { number: '4호차', vehicle: '34라 3456', route: '야탑역 → 이천 KGC 본사', capacity: 45, useYn: 'Y', start: '2025-03-01', end: '2025-11-30' },
    'BUS_05': { number: '5호차', vehicle: '35마 7890', route: '부평역 → 이천 KGC 본사', capacity: 45, useYn: 'N', start: '2025-06-01', end: '2025-12-31' },
    'BUS_06': { number: '6호차', vehicle: '36바 7777', route: '판교역 → 이천 KGC 본사', capacity: 45, useYn: 'Y', start: '2025-01-01', end: '2025-12-31' },
    'BUS_07': { number: '7호차', vehicle: '37사 8888', route: '인천공항 → 이천 KGC 본사', capacity: 45, useYn: 'Y', start: '2025-01-01', end: '2025-12-31' }
  };

  // 호차 선택 시 자동 데이터 추천 이벤트
  function onBusNumberChange(val) {
    if (!val || busId) return;
    const info = busDataMap[val];
    if (info) {
      document.getElementById('busVehicleNumber').value = info.vehicle;
      document.getElementById('busRoute').value = info.route;
      document.getElementById('capacity').value = info.capacity;
      document.getElementById('useYn').value = info.useYn;
      document.getElementById('operationStartDate').value = info.start;
      document.getElementById('operationEndDate').value = info.end;
      BOLayout.showToast(`${info.number} 추천 데이터 입력됨`);
    }
  }

  // 초기화 및 데이터 로딩
  document.addEventListener('DOMContentLoaded', () => {
    if (busId) {
      titleEl.textContent = '버스 수정';
      deleteBtn.style.display = 'inline-flex';
      document.getElementById('busNumberCode').disabled = true;

      // 동적 추가 저장소 확인
      const customBuses = JSON.parse(sessionStorage.getItem('custom_buses') || '{}');
      const data = customBuses[busId] || busDataMap[busId] || {
        number: '1호차', vehicle: '31가 1234', route: '서울역 → 이천 KGC 본사', capacity: 45, useYn: 'Y', start: '2025-01-01', end: '2025-12-31'
      };

      document.getElementById('busNumberCode').value = busId;
      document.getElementById('busVehicleNumber').value = data.vehicle || '';
      document.getElementById('busRoute').value = data.route || '';
      document.getElementById('capacity').value = data.capacity || 45;
      document.getElementById('useYn').value = data.useYn || 'Y';
      document.getElementById('operationStartDate').value = data.start || '2025-01-01';
      document.getElementById('operationEndDate').value = data.end || '2025-12-31';
    }
  });

  // 저장 이벤트
  function handleSave(e) {
    e.preventDefault();
    const sel = document.getElementById('busNumberCode');
    const selectedBusId = busId || sel.value;
    const busNumText = sel.options[sel.selectedIndex]?.text || selectedBusId;

    const busVehicleNumber = document.getElementById('busVehicleNumber').value.trim();
    const busRoute = document.getElementById('busRoute').value.trim();
    const capacity = document.getElementById('capacity').value;
    const useYn = document.getElementById('useYn').value;
    const start = document.getElementById('operationStartDate').value;
    const end = document.getElementById('operationEndDate').value;

    BOLayout.openModal('버스 저장', '입력한 내용으로 저장하시겠습니까?', () => {
      BOLayout.showLoading();
      document.getElementById('saveBtn').disabled = true;

      // sessionStorage 저장
      const customBuses = JSON.parse(sessionStorage.getItem('custom_buses') || '{}');
      customBuses[selectedBusId] = {
        busId: selectedBusId,
        number: busNumText.split(' ')[0],
        vehicle: busVehicleNumber || '-',
        route: busRoute || '-',
        capacity: Number(capacity),
        useYn: useYn,
        start: start,
        end: end
      };
      sessionStorage.setItem('custom_buses', JSON.stringify(customBuses));

      setTimeout(() => {
        BOLayout.hideLoading();
        BOLayout.showToast('저장했습니다.');
        setTimeout(() => { location.href = 'bus-list.html'; }, 800);
      }, 400);
    });
  }

  // 삭제 이벤트
  function handleDelete() {
    BOLayout.openModal('버스 삭제', '해당 버스 정보를 삭제하시겠습니까?', () => {
      BOLayout.showLoading();

      const customBuses = JSON.parse(sessionStorage.getItem('custom_buses') || '{}');
      if (busId) {
        customBuses[busId] = { deleted: true };
        sessionStorage.setItem('custom_buses', JSON.stringify(customBuses));
      }

      setTimeout(() => {
        BOLayout.hideLoading();
        BOLayout.showToast('삭제했습니다.');
        setTimeout(() => { location.href = 'bus-list.html'; }, 800);
      }, 400);
    });
  }
</script>
</body>
</html>
