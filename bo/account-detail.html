<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>계정 상세/등록 - Smart Office Back Office</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;800;900&family=Noto+Sans+KR:wght@400;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="common.css">
</head>
<body class="admin-page">

<main class="admin-content">
  <div class="page-heading">
    <div>
      <p class="eyebrow">ACCOUNT DETAIL</p>
      <h1 id="account-detail-title">계정 등록</h1>
      <p>계정 기본정보와 사용 상태를 저장합니다.</p>
    </div>
    <a class="button button--ghost button--list" href="accounts.html">목록</a>
  </div>

  <section class="panel">
    <form id="account-detail-form" onsubmit="handleSave(event)">
      <div class="form-grid">
        <div class="form-field">
          <label for="account-user-id">사용자 ID</label>
          <input id="account-user-id" maxlength="50" placeholder="예: admin" required>
        </div>
        <div class="form-field">
          <label for="account-user-name">사용자명</label>
          <input id="account-user-name" maxlength="100" placeholder="예: 관리자" required>
        </div>
        <div class="form-field">
          <label for="account-role-id">권한</label>
          <select id="account-role-id" required>
            <option value="ROLE_ADMIN">SUPER ADMIN</option>
            <option value="ROLE_BUS_ADMIN">BUS OPERATOR</option>
            <option value="ROLE_PARKING_ADMIN">PARKING OPERATOR</option>
          </select>
        </div>
        <div class="form-field">
          <label for="account-password">비밀번호</label>
          <input id="account-password" type="password" minlength="4" placeholder="비밀번호 입력">
          <small class="field-hint">최소 4자 이상. 수정 시 비워두면 기존 비밀번호를 유지합니다.</small>
        </div>
        <div class="form-field">
          <label for="account-use-yn">사용 여부</label>
          <select id="account-use-yn">
            <option value="Y">사용</option>
            <option value="N">미사용</option>
          </select>
        </div>
        <div class="form-field">
          <label for="account-lock-yn">잠금 여부</label>
          <select id="account-lock-yn">
            <option value="N">정상</option>
            <option value="Y">잠금</option>
          </select>
        </div>
      </div>
      <div class="form-actions form-actions--spaced" style="margin-top:24px;">
        <button class="button button--danger" type="button" id="deleteBtn" onclick="handleDelete()" style="display:none;">삭제</button>
        <button class="button button--primary" type="submit">저장</button>
      </div>
    </form>
  </section>
</main>

<script src="common.js"></script>
<script src="layout.js"></script>
<script>
  const urlParams = new URLSearchParams(window.location.search);
  const id = urlParams.get('id');
  const titleEl = document.getElementById('account-detail-title');
  const deleteBtn = document.getElementById('deleteBtn');

  if (id) {
    titleEl.textContent = `계정 수정 (${id})`;
    deleteBtn.style.display = 'inline-flex';
    document.getElementById('account-user-id').value = id;
    if (id === 'admin') {
      document.getElementById('account-user-name').value = '최고관리자';
      document.getElementById('account-role-id').value = 'ROLE_ADMIN';
    } else if (id === 'oper_bus') {
      document.getElementById('account-user-name').value = '버스담당자';
      document.getElementById('account-role-id').value = 'ROLE_BUS_ADMIN';
    }
  }

  function handleSave(e) {
    e.preventDefault();
    BOLayout.showToast('계정 정보가 저장되었습니다.');
    setTimeout(() => { location.href = 'accounts.html'; }, 1000);
  }

  function handleDelete() {
    if (confirm('해당 관리자 계정을 삭제하시겠습니까?')) {
      BOLayout.showToast('삭제 처리되었습니다.');
      setTimeout(() => { location.href = 'accounts.html'; }, 1000);
    }
  }
</script>
</body>
</html>
